server.port=8080
spring.application.name=passport-scraper

# Database
spring.datasource.url=jdbc:h2:file:./data/passportdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# CORS
spring.web.cors.allowed-origins=https://dashboard-psi-navy-53.vercel.app,https://dashboard-lxiwrxcck-navnishrajputs-projects.vercel.app,http://localhost:3000

# Scheduling
spring.task.scheduling.pool.size=5

# Logging
logging.level.com.zebvo=INFO
logging.level.org.springframework=WARN
